services:

  # ── TradeX REST API ────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Use MinIO as a local S3-compatible store
      TRADEX_STORAGE_BACKEND: s3
      TRADEX_S3_BUCKET: tradex
      TRADEX_S3_PREFIX: tradex
      TRADEX_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      # Schedule daily predictions for these assets (empty = disabled)
      TRADEX_SCHEDULE_ASSETS: ""
      TRADEX_SCHEDULE_HOUR: "9"
      TRADEX_DRILL_DATA_DIR: /app/data/drill
    volumes:
      - drill_data:/app/data/drill
    depends_on:
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── MinIO (S3-compatible local object store) ───────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console  →  http://localhost:9001  (minioadmin / minioadmin)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── One-shot init: create the "tradex" bucket ─────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/tradex &&
        echo 'Bucket ready.'
      "
    restart: "no"

volumes:
  minio_data:
  drill_data:
